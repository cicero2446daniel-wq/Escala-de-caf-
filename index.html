<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala do Café CBV</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sent-ok { border-color: #10b981; background-color: #ecfdf5; }
        .sent-pending { border-color: #ef4444; background-color: #fef2f2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 bg-gray-100">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <div class="text-center mb-6">
            <span class="text-5xl">☕</span>
            <h1 class="text-2xl font-bold text-gray-800">Escala do Café CBV</h1>
        </div>

        <div id="status-card" class="border-l-8 p-4 mb-6 rounded-r-lg shadow-sm">
            <p id="status-text" class="text-xs font-bold uppercase"></p>
            <p id="info-proximo" class="text-gray-700 mt-1 font-medium"></p>
            <button id="btn-enviar" onclick="enviarWhatsapp()" class="mt-4 w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-green-700 transition flex items-center justify-center gap-2">
                <span>Enviar p/ WhatsApp</span>
            </button>
        </div>

        <div class="mb-6">
            <h2 class="text-lg font-bold mb-3 border-b pb-1">Ordem da Escala</h2>
            <ul id="lista-integrantes" class="space-y-2"></ul>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
            <h3 id="form-title" class="font-bold text-sm mb-3 text-gray-600 uppercase">Adicionar Novo</h3>
            <input type="hidden" id="edit-index" value="-1">
            <input type="text" id="nome" placeholder="Nome do integrante" class="w-full mb-2 p-3 border rounded-lg">
            <input type="tel" id="telefone" placeholder="55 + DDD + Numero" class="w-full mb-3 p-3 border rounded-lg">
            <button onclick="salvarIntegrante()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-md">Salvar na Lista</button>
            <button id="btn-cancelar" onclick="limparForm()" class="hidden w-full mt-2 text-red-500 font-medium">Cancelar Edição</button>
        </div>
    </div>

    <script>
        let integrantes = JSON.parse(localStorage.getItem('escalaCafe')) || [];
        let indexAtual = parseInt(localStorage.getItem('indexAtual')) || 0;
        let ultimaSemanaEnviada = localStorage.getItem('ultimaSemanaEnviada') || "";

        function getNumeroSemana() {
            const d = new Date();
            const t = d.getTime();
            const n = new Date(d.getFullYear(), 0, 1).getTime();
            return Math.ceil(( (t - n) / 86400000 + 1) / 7);
        }

        function proximoDomingo() {
            const hoje = new Date();
            const proximo = new Date(hoje);
            proximo.setDate(hoje.getDate() + (7 - hoje.getDay()) % 7 || 7);
            return proximo.toLocaleDateString('pt-BR');
        }

        function render() {
            const lista = document.getElementById('lista-integrantes');
            const card = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            const info = document.getElementById('info-proximo');
            
            lista.innerHTML = '';
            const semanaAtual = `${new Date().getFullYear()}-${getNumeroSemana()}`;

            if (integrantes.length === 0) {
                info.innerText = "Nenhum integrante cadastrado.";
                card.className = "border-l-8 p-4 mb-6 rounded-r-lg bg-gray-50 border-gray-300";
                return;
            }

            if (indexAtual >= integrantes.length) indexAtual = 0;
            const pessoa = integrantes[indexAtual];
            info.innerText = `Este domingo (${proximoDomingo()}) é a vez de: ${pessoa.nome}`;

            // Lógica de pendência
            if (ultimaSemanaEnviada === semanaAtual) {
                card.className = "border-l-8 p-4 mb-6 rounded-r-lg sent-ok";
                statusText.innerText = "✅ Aviso de hoje enviado";
                statusText.className = "text-xs font-bold uppercase text-green-600";
            } else {
                card.className = "border-l-8 p-4 mb-6 rounded-r-lg sent-pending";
                statusText.innerText = "⚠️ Envio Pendente!";
                statusText.className = "text-xs font-bold uppercase text-red-600";
            }

            integrantes.forEach((p, i) => {
                lista.innerHTML += `
                    <li class="p-3 flex justify-between items-center bg-white border rounded-lg ${i === indexAtual ? 'border-indigo-500 ring-1 ring-indigo-200' : ''}">
                        <div>
                            <p class="font-bold ${i === indexAtual ? 'text-indigo-700' : 'text-gray-700'}">${p.nome}</p>
                            <p class="text-xs text-gray-400">${p.telefone}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editar(${i})" class="text-indigo-500 font-medium">Editar</button>
                            <button onclick="deletar(${i})" class="text-red-400">Excluir</button>
                        </div>
                    </li>
                `;
            });

            localStorage.setItem('escalaCafe', JSON.stringify(integrantes));
            localStorage.setItem('indexAtual', indexAtual);
        }

        function enviarWhatsapp() {
            if (integrantes.length === 0) return;
            const pessoa = integrantes[indexAtual];
            const msg = `Este domingo é a vez de ${pessoa.nome} fazer o café antes do culto de ${proximoDomingo()}.`;
            
            const semanaAtual = `${new Date().getFullYear()}-${getNumeroSemana()}`;
            localStorage.setItem('ultimaSemanaEnviada', semanaAtual);
            
            // Só avança o índice se for um novo envio de semana
            if (ultimaSemanaEnviada !== semanaAtual) {
                indexAtual = (indexAtual + 1) % integrantes.length;
                localStorage.setItem('indexAtual', indexAtual);
            }

            window.open(`https://wa.me/${pessoa.telefone}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload(); // Recarrega para atualizar o status visual
        }

        function salvarIntegrante() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const editIndex = parseInt(document.getElementById('edit-index').value);
            if (!nome || !telefone) return alert("Preencha os campos!");
            if (editIndex > -1) integrantes[editIndex] = { nome, telefone };
            else integrantes.push({ nome, telefone });
            limparForm();
            render();
        }

        function editar(i) {
            document.getElementById('nome').value = integrantes[i].nome;
            document.getElementById('telefone').value = integrantes[i].telefone;
            document.getElementById('edit-index').value = i;
            document.getElementById('form-title').innerText = "Editando Integrante";
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function deletar(i) {
            if (confirm("Remover da escala?")) {
                integrantes.splice(i, 1);
                render();
            }
        }

        function limparForm() {
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('edit-index').value = '-1';
            document.getElementById('form-title').innerText = "Adicionar Novo";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        render();
    </script>
</body>
</html>
