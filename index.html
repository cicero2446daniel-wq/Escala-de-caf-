<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala do Café CBV</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .coffee-icon { font-size: 3rem; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <div class="text-center mb-6">
            <span class="coffee-icon">☕</span>
            <h1 class="text-2xl font-bold text-brown-800">Escala do Café CBV</h1>
        </div>

        <div id="status-card" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6">
            <p class="text-sm text-yellow-700 font-bold">Próximo Domingo:</p>
            <p id="info-proximo" class="text-lg text-gray-800 italic">Carregando escala...</p>
            <button onclick="enviarWhatsapp()" class="mt-3 w-full bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-600 transition">
                🚀 Enviar Aviso via WhatsApp
            </button>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-3">Integrantes</h2>
            <ul id="lista-integrantes" class="divide-y divide-gray-200"></ul>
        </div>

        <div class="bg-gray-50 p-4 rounded-lg">
            <h3 id="form-title" class="font-bold mb-2">Adicionar Integrante</h3>
            <input type="hidden" id="edit-index" value="-1">
            <input type="text" id="nome" placeholder="Nome" class="w-full mb-2 p-2 border rounded">
            <input type="tel" id="telefone" placeholder="5511999999999" class="w-full mb-2 p-2 border rounded">
            <button onclick="salvarIntegrante()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Salvar</button>
            <button id="btn-cancelar" onclick="limparForm()" class="hidden w-full mt-2 text-gray-500 text-sm">Cancelar Edição</button>
        </div>
    </div>

    <script>
        let integrantes = JSON.parse(localStorage.getItem('escalaCafe')) || [];
        let indexAtual = parseInt(localStorage.getItem('indexAtual')) || 0;

        function proximoDomingo() {
            const hoje = new Date();
            const proximo = new Date(hoje);
            proximo.setDate(hoje.getDate() + (7 - hoje.getDay()) % 7 || 7);
            return proximo.toLocaleDateString('pt-BR');
        }

        function render() {
            const lista = document.getElementById('lista-integrantes');
            lista.innerHTML = '';
            
            if (integrantes.length === 0) {
                document.getElementById('info-proximo').innerText = "Adicione pessoas à lista.";
                return;
            }

            // Garante que o index não estoure se alguém for deletado
            if (indexAtual >= integrantes.length) indexAtual = 0;

            const pessoaVez = integrantes[indexAtual];
            document.getElementById('info-proximo').innerText = 
                `Este domingo é a vez de ${pessoaVez.nome} fazer o café antes do culto de ${proximoDomingo()}.`;

            integrantes.forEach((p, i) => {
                lista.innerHTML += `
                    <li class="py-3 flex justify-between items-center ${i === indexAtual ? 'bg-yellow-100 p-2 rounded' : ''}">
                        <div>
                            <p class="font-bold">${p.nome} ${i === indexAtual ? '⭐' : ''}</p>
                            <p class="text-xs text-gray-500">${p.telefone}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editar(${i})" class="text-blue-500 text-sm">Editar</button>
                            <button onclick="deletar(${i})" class="text-red-500 text-sm">Excluir</button>
                        </div>
                    </li>
                `;
            });
            localStorage.setItem('escalaCafe', JSON.stringify(integrantes));
            localStorage.setItem('indexAtual', indexAtual);
        }

        function salvarIntegrante() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const editIndex = parseInt(document.getElementById('edit-index').value);

            if (!nome || !telefone) return alert("Preencha tudo!");

            if (editIndex > -1) {
                integrantes[editIndex] = { nome, telefone };
            } else {
                integrantes.push({ nome, telefone });
            }
            limparForm();
            render();
        }

        function enviarWhatsapp() {
            if (integrantes.length === 0) return;
            const pessoa = integrantes[indexAtual];
            const data = proximoDomingo();
            const msg = `Este domingo é a vez de ${pessoa.nome} fazer o café antes do culto de ${data}.`;
            
            // Incrementa para a próxima semana e reseta se chegar ao fim
            indexAtual = (indexAtual + 1) % integrantes.length;
            localStorage.setItem('indexAtual', indexAtual);
            
            const url = `https://wa.me/${pessoa.telefone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
            render();
        }

        function editar(i) {
            document.getElementById('nome').value = integrantes[i].nome;
            document.getElementById('telefone').value = integrantes[i].telefone;
            document.getElementById('edit-index').value = i;
            document.getElementById('form-title').innerText = "Editar Integrante";
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function deletar(i) {
            if (confirm("Excluir integrante?")) {
                integrantes.splice(i, 1);
                render();
            }
        }

        function limparForm() {
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('edit-index').value = '-1';
            document.getElementById('form-title').innerText = "Adicionar Integrante";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        render();
        
        if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
    </script>
</body>
</html>
